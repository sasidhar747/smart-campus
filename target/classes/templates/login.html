<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<body>
    <main style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
        <div class="glass" style="width: 100%; max-width: 400px; padding: 2.5rem;">
            <h1 style="text-align: center; margin-bottom: 0.5rem;">Admin Login</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">Secure access for university staff.</p>

            <div th:if="${param.error}" class="glass" style="padding: 0.75rem; background: rgba(239, 68, 68, 0.1); border-color: var(--danger); margin-bottom: 1.5rem; text-align: center;">
                <p class="error-msg">Invalid email or password</p>
            </div>

            <div th:if="${param.signupSuccess}" class="glass" style="padding: 0.75rem; background: rgba(34, 197, 94, 0.1); border-color: var(--success); margin-bottom: 1.5rem; text-align: center;">
                <p style="color: var(--success);">Account created! Please login.</p>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="john@univ.edu" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>

            <p style="text-align: center; margin-top: 2rem; font-size: 0.875rem; color: var(--text-secondary);">
                Don't have an account? <a th:href="@{/signup}" style="color: var(--primary);">Sign up now</a>
            </p>
            
            <p style="text-align: center; margin-top: 2rem; font-size: 0.875rem; color: var(--text-secondary);">
                Email: admin@univ.edu | Password: admin123
            </p>
        </div>
    </main>
</body>
</html>
