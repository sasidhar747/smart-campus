<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<body>
    <main>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Admin Dashboard</h1>
            <a th:href="@{/admin/events/new}" class="btn btn-primary">+ Create New Event</a>
        </div>

        <section class="glass" style="padding: 1.5rem; margin-bottom: 2rem;">
            <form th:action="@{/admin/dashboard}" method="get" style="display: flex; gap: 1rem; align-items: flex-end;">
                <div class="form-group" style="margin: 0; flex: 1;">
                    <label>Department</label>
                    <select name="department">
                        <option value="">All Departments</option>
                        <option value="Computer Science" th:selected="${selectedDept == 'Computer Science'}">Computer Science</option>
                        <option value="Placement Cell" th:selected="${selectedDept == 'Placement Cell'}">Placement Cell</option>
                        <option value="General" th:selected="${selectedDept == 'General'}">General</option>
                    </select>
                </div>
                <div class="form-group" style="margin: 0; flex: 1;">
                    <label>Type</label>
                    <select name="type">
                        <option value="">All Types</option>
                        <option value="Workshop" th:selected="${selectedType == 'Workshop'}">Workshop</option>
                        <option value="Seminar" th:selected="${selectedType == 'Seminar'}">Seminar</option>
                    </select>
                </div>
                <div class="form-group" style="margin: 0; flex: 1;">
                    <label>Date</label>
                    <input type="date" name="date" th:value="${selectedDate}">
                </div>
                <button type="submit" class="btn btn-primary">Filter</button>
            </form>
        </section>

        <div class="stats-grid">
            <div class="glass stat-card">
                <p style="color: var(--text-secondary);">Total Events</p>
                <div class="stat-value" th:text="${#lists.size(events)}">0</div>
            </div>
            <div class="glass stat-card">
                <p style="color: var(--text-secondary);">Total Registrations</p>
                <div class="stat-value" th:text="${#aggregates.sum(events.![registeredCount]) ?: 0}">0</div>
            </div>
            <div class="glass stat-card">
                <p style="color: var(--text-secondary);">Avg. Attendance</p>
                <div class="stat-value" 
                     th:text="${#lists.size(events) > 0 ? #aggregates.sum(events.![registeredCount]) / #lists.size(events) : 0}">0</div>
            </div>
        </div>

        <div class="glass" style="padding: 1rem; overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Type</th>
                        <th>Department</th>
                        <th>Date</th>
                        <th>Capacity</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="event : ${events}">
                        <td th:text="${event.title}">Title</td>
                        <td><span class="badge badge-purple" th:text="${event.type}">Type</span></td>
                        <td th:text="${event.department}">Dept</td>
                        <td th:text="${#temporals.format(event.eventDate, 'dd MMM yyyy')}">Date</td>
                        <td>
                            <div style="font-size: 0.875rem;">
                                <span th:text="${event.registeredCount}">0</span> / <span th:text="${event.capacity}">10</span>
                                <div style="width: 100px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 4px;">
                                    <div th:style="'height: 100%; background: var(--primary); border-radius: 2px; width: ' + (${event.registeredCount} * 100 / ${event.capacity}) + '%'"></div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div style="display: flex; gap: 0.5rem;">
                                <a th:href="@{'/admin/events/registrations/' + ${event.id}}" class="btn glass" style="padding: 0.4rem 0.8rem; font-size: 0.875rem;">Attendees</a>
                                <a th:href="@{'/admin/events/edit/' + ${event.id}}" class="btn glass" style="padding: 0.4rem 0.8rem; font-size: 0.875rem;">Edit</a>
                                <a th:href="@{'/admin/events/delete/' + ${event.id}}" class="btn btn-danger" 
                                   style="padding: 0.4rem 0.8rem; font-size: 0.875rem;"
                                   onclick="return confirm('Are you sure?')">Delete</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
