<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<body>
    <main>
        <a th:href="@{/admin/dashboard}" style="color: var(--primary); text-decoration: none; display: inline-block; margin-bottom: 1rem;">&larr; Back to Dashboard</a>
        
        <div class="glass" style="max-width: 800px; margin: 0 auto; padding: 2.5rem;">
            <h1 th:text="${event.id == null ? 'Create New Event' : 'Edit Event'}">Create Event</h1>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Fill in the details for the campus event.</p>

            <form th:action="@{/admin/events/save}" th:object="${event}" method="post">
                <input type="hidden" th:field="*{id}" />
                <input type="hidden" th:field="*{registeredCount}" />
                
                <div class="form-group">
                    <label>Event Title</label>
                    <input type="text" th:field="*{title}" placeholder="e.g. AI Symposium 2026" />
                    <p class="error-msg" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea th:field="*{description}" rows="4" placeholder="Briefly describe the event..."></textarea>
                    <p class="error-msg" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label>Date & Time</label>
                        <input type="datetime-local" th:field="*{eventDate}" />
                        <p class="error-msg" th:if="${#fields.hasErrors('eventDate')}" th:errors="*{eventDate}"></p>
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" th:field="*{location}" placeholder="e.g. Room 402, Building B" />
                        <p class="error-msg" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></p>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label>Department</label>
                        <select th:field="*{department}">
                            <option value="Computer Science">Computer Science</option>
                            <option value="Electrical Engineering">Electrical Engineering</option>
                            <option value="Placement Cell">Placement Cell</option>
                            <option value="General">General</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Event Type</label>
                        <select th:field="*{type}">
                            <option value="Workshop">Workshop</option>
                            <option value="Seminar">Seminar</option>
                            <option value="Cultural">Cultural</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Capacity</label>
                        <input type="number" th:field="*{capacity}" />
                        <p class="error-msg" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></p>
                    </div>
                </div>

                <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Event</button>
                    <a th:href="@{/admin/dashboard}" class="btn glass" style="flex: 1; text-align: center;">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
