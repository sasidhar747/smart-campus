<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<body>
    <main style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="glass" style="width: 100%; max-width: 500px; padding: 2.5rem;">
            <h1 style="text-align: center; margin-bottom: 0.5rem;">Create Account</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">Join the campus event community.</p>

            <div th:if="${errorMessage}" class="error-msg" style="text-align: center; margin-bottom: 1rem;" th:text="${errorMessage}"></div>

            <form th:action="@{/signup}" th:object="${user}" method="post">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{name}" placeholder="John Doe" />
                    <p class="error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" th:field="*{email}" placeholder="john@univ.edu" />
                    <p class="error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" th:field="*{password}" placeholder="••••••••" />
                        <p class="error-msg" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <select th:field="*{department}">
                            <option value="Computer Science">Computer Science</option>
                            <option value="Electrical Engineering">Electrical Engineering</option>
                            <option value="Management">Management</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
                
                <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-secondary);">
                    Already have an account? <a th:href="@{/login}" style="color: var(--primary);">Login here</a>
                </p>
            </form>
        </div>
    </main>
</body>
</html>
