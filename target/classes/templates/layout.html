<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus Events</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <nav class="glass">
        <a th:href="@{/}" class="logo">SmartCampus</a>
        <div class="nav-links">
            <a th:href="@{/}">All Events</a>
            
            <!-- For Logged in users -->
            <span sec:authorize="isAuthenticated()">
                <a th:href="@{'/my-registrations?email=' + ${#authentication.getPrincipal().getUsername()}}">My Registrations</a>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/dashboard}">Admin</a>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn glass" style="padding: 0.4rem 0.8rem; margin-left: 1rem;">Logout</button>
                </form>
            </span>

            <!-- For Guests -->
            <span sec:authorize="isAnonymous()">
                <a th:href="@{/signup}">Sign Up</a>
                <a th:href="@{/login}" class="btn btn-primary">Login</a>
            </span>
        </div>
    </nav>

    <div class="container">
        <div th:replace="${content}"></div>
    </div>
</body>
</html>
