<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<body>
    <main>
        <a th:href="@{/}" style="color: var(--primary); text-decoration: none; display: inline-block; margin-bottom: 1rem;">&larr; Back to Events</a>
        
        <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 2rem;">
            <!-- Event Info -->
            <div class="glass" style="padding: 2rem;">
                <span class="badge badge-blue" th:text="${event.type}">Type</span>
                <h1 th:text="${event.title}" style="margin: 1rem 0;">Event Title</h1>
                <div class="meta" style="font-size: 1.1rem; margin-bottom: 2rem;">
                    <p>📅 <span th:text="${#temporals.format(event.eventDate, 'dd MMMM yyyy, HH:mm')}">Date</span></p>
                    <p>📍 <span th:text="${event.location}">Location</span></p>
                    <p>🏢 <span th:text="${event.department}">Department</span></p>
                </div>
                
                <h3>Description</h3>
                <p th:text="${event.description}" style="line-height: 1.6; margin-top: 1rem; color: var(--text-secondary);"></p>
                
                <div style="margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--glass-border);">
                    <p><strong>Capacity:</strong> <span th:text="${event.registeredCount}">0</span> / <span th:text="${event.capacity}">10</span> registered</p>
                </div>
            </div>

            <!-- Registration Form -->
            <div class="glass" style="padding: 2rem;">
                <h2>Register for Event</h2>
                <p style="margin-bottom: 1.5rem; color: var(--text-secondary);">Fill in your details to secure a spot.</p>

                <div th:if="${errorMessage}" class="glass" style="padding: 1rem; background: rgba(239, 68, 68, 0.1); border-color: var(--danger); margin-bottom: 1rem;">
                    <p class="error-msg" th:text="${errorMessage}"></p>
                </div>

                <form th:action="@{/register}" th:object="${registration}" method="post">
                    <input type="hidden" th:field="*{eventId}" />
                    
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" th:field="*{studentName}" placeholder="John Doe" />
                        <p class="error-msg" th:if="${#fields.hasErrors('studentName')}" th:errors="*{studentName}"></p>
                    </div>

                    <div class="form-group">
                        <label>Campus Email</label>
                        <input type="email" th:field="*{studentEmail}" placeholder="john@university.edu" />
                        <p class="error-msg" th:if="${#fields.hasErrors('studentEmail')}" th:errors="*{studentEmail}"></p>
                    </div>

                    <div class="form-group">
                        <label>Department</label>
                        <select th:field="*{studentDepartment}">
                            <option value="">Select Department</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Electrical Engineering">Electrical Engineering</option>
                            <option value="Management">Management</option>
                        </select>
                        <p class="error-msg" th:if="${#fields.hasErrors('studentDepartment')}" th:errors="*{studentDepartment}"></p>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;" 
                            th:disabled="${event.registeredCount >= event.capacity}">
                        <span th:if="${event.registeredCount < event.capacity}">Confirm Registration</span>
                        <span th:if="${event.registeredCount >= event.capacity}">Event Full</span>
                    </button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
