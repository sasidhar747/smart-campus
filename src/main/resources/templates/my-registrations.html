<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<body>
    <main>
        <header style="margin-bottom: 2rem;">
            <h1>My Registrations</h1>
            <p style="color: var(--text-secondary);">Showing events for: <strong th:text="${email}">email@example.com</strong></p>
        </header>

        <div class="glass" style="padding: 1rem;">
            <table th:if="${not #lists.isEmpty(registrations)}">
                <thead>
                    <tr>
                        <th>Event</th>
                        <th>Date Registered</th>
                        <th>Department</th>
                        <th>Status</th>
                        <th>Feedback</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="reg : ${registrations}">
                        <td th:text="${reg.eventTitle}">Event Title</td>
                        <td th:text="${#temporals.format(reg.registrationDate, 'dd MMM yyyy')}">Date</td>
                        <td th:text="${reg.studentDepartment}">Dept</td>
                        <td><span class="badge badge-blue">Confirmed</span></td>
                        <td>
                            <div th:if="${reg.rating == 0}">
                                <button class="btn glass" style="padding: 0.2rem 0.6rem; font-size: 0.75rem;" 
                                        th:onclick="'showFeedbackForm(' + ${reg.id} + ')'">Rate</button>
                                
                                <div th:id="'form-' + ${reg.id}" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; width: 300px; padding: 1.5rem;" class="glass">
                                    <h4 style="margin-bottom: 1rem;">Provide Feedback</h4>
                                    <form th:action="@{/feedback}" method="post">
                                        <input type="hidden" name="regId" th:value="${reg.id}" />
                                        <input type="hidden" name="email" th:value="${email}" />
                                        <div class="form-group">
                                            <label>Rating (1-5)</label>
                                            <input type="number" name="rating" min="1" max="5" value="5" />
                                        </div>
                                        <div class="form-group">
                                            <label>Comment</label>
                                            <textarea name="feedback" rows="3"></textarea>
                                        </div>
                                        <button type="submit" class="btn btn-primary" style="width: 100%;">Submit</button>
                                        <button type="button" class="btn glass" style="width: 100%; margin-top: 0.5rem;" th:onclick="'hideFeedbackForm(' + ${reg.id} + ')'">Cancel</button>
                                    </form>
                                </div>
                            </div>
                            <div th:if="${reg.rating > 0}">
                                <span th:text="${'★'.repeat(reg.rating)}" style="color: #fbbf24;"></span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <script>
                function showFeedbackForm(id) {
                    document.getElementById('form-' + id).style.display = 'block';
                }
                function hideFeedbackForm(id) {
                    document.getElementById('form-' + id).style.display = 'none';
                }
            </script>
            
            <div th:if="${#lists.isEmpty(registrations)}" style="text-align: center; padding: 3rem;">
                <p style="color: var(--text-secondary);">No registrations found for this email.</p>
                <a th:href="@{/}" class="btn btn-primary" style="margin-top: 1rem;">Browse Events</a>
            </div>
        </div>
    </main>
</body>
</html>
