<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<body>
<main class="center-screen">
    <section class="glass panel auth-card">
        <span class="eyebrow" th:text="${statusCode != null ? 'Error ' + statusCode : 'Request Error'}">Error</span>
        <h1>Something needs attention.</h1>
        <p class="center-copy">The request could not be completed. The message below is shown through the global exception handler.</p>

        <div class="alert alert-danger">
            <span th:text="${errorMessage}">Error details</span>
        </div>

        <div class="hero-actions">
            <a th:href="@{/}" class="btn btn-primary">Return Home</a>
            <a th:href="@{/login}" class="btn btn-secondary">Student Login</a>
        </div>
    </section>
</main>
</body>
</html>
