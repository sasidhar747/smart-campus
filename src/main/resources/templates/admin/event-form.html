<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<body>
<main>
    <a th:href="@{/admin/dashboard}" class="back-link">&larr; Back to dashboard</a>

    <section class="glass panel form-shell">
        <div class="section-header">
            <div>
                <h1 th:text="${event.id == null ? 'Create New Event' : 'Edit Event'}">Event Form</h1>
                <p>Admin-only form with Spring validation and JPA persistence.</p>
            </div>
        </div>

        <form th:action="@{/admin/events/save}" th:object="${event}" method="post" class="stack-form">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{registeredCount}">

            <div class="form-group">
                <label for="title">Event Title</label>
                <input id="title" type="text" th:field="*{title}" placeholder="Example: Cloud Computing Workshop">
                <p class="error-msg" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" th:field="*{description}" rows="5"
                          placeholder="Explain the purpose, audience, and value of the event."></textarea>
                <p class="error-msg" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>
            </div>

            <div class="three-col-grid">
                <div class="form-group">
                    <label for="eventDate">Date and Time</label>
                    <input id="eventDate" type="datetime-local" th:field="*{eventDate}">
                    <p class="error-msg" th:if="${#fields.hasErrors('eventDate')}" th:errors="*{eventDate}"></p>
                </div>

                <div class="form-group">
                    <label for="location">Location</label>
                    <input id="location" type="text" th:field="*{location}" placeholder="Seminar Hall 1">
                    <p class="error-msg" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></p>
                </div>

                <div class="form-group">
                    <label for="capacity">Capacity</label>
                    <input id="capacity" type="number" min="1" th:field="*{capacity}">
                    <p class="error-msg" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></p>
                </div>
            </div>

            <div class="two-col-grid">
                <div class="form-group">
                    <label for="departmentSelect">Department</label>
                    <select id="departmentSelect" th:field="*{department}">
                        <option th:each="department : ${departments}" th:value="${department}" th:text="${department}">
                            Department
                        </option>
                    </select>
                    <p class="error-msg" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></p>
                </div>

                <div class="form-group">
                    <label for="typeSelect">Event Type</label>
                    <select id="typeSelect" th:field="*{type}">
                        <option th:each="eventType : ${eventTypes}" th:value="${eventType}" th:text="${eventType}">
                            Type
                        </option>
                    </select>
                    <p class="error-msg" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></p>
                </div>
            </div>

            <div class="action-row">
                <button type="submit" class="btn btn-primary">Save Event</button>
                <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
