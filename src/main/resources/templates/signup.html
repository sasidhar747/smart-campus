<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<body>
<main class="center-screen">
    <section class="glass panel auth-card">
        <div class="section-header compact">
            <div>
                <h1>Create Student Account</h1>
                <p>Sign up once, then use your account to register and review campus events.</p>
            </div>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form th:action="@{/signup}" th:object="${user}" method="post" class="stack-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input id="name" type="text" th:field="*{name}" placeholder="Enter your full name">
                <p class="error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            </div>

            <div class="form-group">
                <label for="emailAddress">Email Address</label>
                <input id="emailAddress" type="email" th:field="*{email}" placeholder="student@univ.edu">
                <p class="error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            </div>

            <div class="two-col-grid">
                <div class="form-group">
                    <label for="passwordField">Password</label>
                    <input id="passwordField" type="password" th:field="*{password}" placeholder="Minimum 6 characters">
                    <p class="error-msg" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                </div>

                <div class="form-group">
                    <label for="departmentField">Department</label>
                    <select id="departmentField" th:field="*{department}">
                        <option th:each="department : ${departments}" th:value="${department}" th:text="${department}">
                            Department
                        </option>
                    </select>
                    <p class="error-msg" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></p>
                </div>
            </div>

            <button type="submit" class="btn btn-primary full-width">Create Account</button>
        </form>

        <p class="center-copy">
            Already registered? <a th:href="@{/login}">Login here</a>.
        </p>
    </section>
</main>
</body>
</html>
