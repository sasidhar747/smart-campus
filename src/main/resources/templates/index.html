<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<body>
    <main>
        <header style="margin-bottom: 2rem;">
            <h1>Upcoming Events</h1>
            <p style="color: var(--text-secondary);">Browse and register for the latest campus activities.</p>
        </header>

        <section class="glass" style="padding: 1.5rem; margin-bottom: 2rem;">
            <form th:action="@{/}" method="get" style="display: flex; gap: 1rem; align-items: flex-end;">
                <div class="form-group" style="margin: 0; flex: 1;">
                    <label>Department</label>
                    <select name="department">
                        <option value="">All Departments</option>
                        <option value="Computer Science" th:selected="${selectedDept == 'Computer Science'}">Computer Science</option>
                        <option value="Placement Cell" th:selected="${selectedDept == 'Placement Cell'}">Placement Cell</option>
                        <option value="General" th:selected="${selectedDept == 'General'}">General</option>
                    </select>
                </div>
                <div class="form-group" style="margin: 0; flex: 1;">
                    <label>Type</label>
                    <select name="type">
                        <option value="">All Types</option>
                        <option value="Workshop" th:selected="${selectedType == 'Workshop'}">Workshop</option>
                        <option value="Seminar" th:selected="${selectedType == 'Seminar'}">Seminar</option>
                    </select>
                </div>
                <div class="form-group" style="margin: 0; flex: 1;">
                    <label>Date</label>
                    <input type="date" name="date" th:value="${selectedDate}">
                </div>
                <button type="submit" class="btn btn-primary">Filter</button>
            </form>
        </section>

        <div class="event-grid">
            <div th:each="event : ${events}" class="glass event-card">
                <span th:class="${event.type == 'Workshop' ? 'badge badge-blue' : 'badge badge-purple'}" th:text="${event.type}">Type</span>
                <h3 th:text="${event.title}" style="margin-top: 0.5rem;">Event Title</h3>
                <p class="meta">
                    <span th:text="${#temporals.format(event.eventDate, 'dd MMM yyyy, HH:mm')}">Date</span> | 
                    <span th:text="${event.location}">Location</span>
                </p>
                <p th:text="${event.description}" style="margin-bottom: 1.5rem; color: var(--text-secondary);"></p>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 0.875rem;">
                        <span th:text="${event.registeredCount}">0</span> / <span th:text="${event.capacity}">10</span> joined
                    </span>
                    <a th:href="@{'/events/' + ${event.id}}" class="btn btn-primary">Details</a>
                </div>
            </div>
        </div>
        
        <div th:if="${#lists.isEmpty(events)}" style="text-align: center; padding: 3rem;">
            <p style="color: var(--text-secondary);">No events found matching your filters.</p>
        </div>
    </main>
</body>
</html>
