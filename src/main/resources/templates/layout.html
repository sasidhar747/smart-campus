<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus Events</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <div class="page-shell">
        <nav class="topbar glass">
            <div class="brand-lockup">
                <a th:href="@{/}" class="logo">SmartCampus Events</a>
                <p class="brand-kicker">Campus portal for events, workshops, and seminars</p>
            </div>

            <div class="nav-links">
                <a th:href="@{/}">Browse Events</a>
                <a sec:authorize="isAuthenticated()" th:href="@{/my-registrations}">My Registrations</a>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/dashboard}">Admin Dashboard</a>

                <span sec:authorize="isAnonymous()" class="nav-auth">
                    <a th:href="@{/signup}">Sign Up</a>
                    <a th:href="@{/login}" class="btn btn-primary">Student Login</a>
                </span>

                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="inline-form">
                    <button type="submit" class="btn btn-secondary">Logout</button>
                </form>
            </div>
        </nav>

        <main class="container">
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:replace="${content}"></div>
        </main>
    </div>
</body>
</html>
